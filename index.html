<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RELIANCE GULF HR PORTAL</title>
    <!-- Add your styling here -->
</head>
<body>

    <!-- NAVIGATION -->
    <nav>
        <ul>
            <li><a href="#subcontractor">Sub-Contractor Portal</a></li>
            <li><a href="#client">Client Portal</a></li>
        </ul>
    </nav>

    <!-- SUB-CONTRACTOR PORTAL -->
    <section id="subcontractor">
        <h2>Sub-Contractor Portal</h2>
        <form id="subcon-form">
            <input type="text" placeholder="Name" required>
            <input type="text" placeholder="Trade License" required>
            <input type="date" placeholder="License Expiry Date" required>
            <input type="text" placeholder="TRN Number" required>
            <input type="text" placeholder="Contact Person Name" required>
            <input type="tel" placeholder="Contact Number" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="State of License" required>
            <input type="text" placeholder="ICV" required>
            
            <h3>Upload Documents</h3>
            <label>License: <input type="file"></label>
            <label>VAT Certificate: <input type="file"></label>
            <label>Bank Account Letter: <input type="file"></label>
            <button type="submit">Save</button>
        </form>
        <button onclick="exportTable('subcon-table')">Export to Excel/PDF</button>
    </section>

    <!-- CLIENT PORTAL -->
    <section id="client">
        <h2>Client Portal</h2>
        <form id="client-form">
            <input type="text" placeholder="Name" required>
            <input type="text" placeholder="Trade License" required>
            <input type="date" placeholder="License Expiry Date" required>
            <input type="text" placeholder="TRN Number" required>
            <input type="tel" placeholder="Contact Number" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="State of License" required>
            <input type="text" placeholder="ICV" required>
            
            <h3>Active Projects</h3>
            <input type="text" placeholder="Project Name">
            <input type="text" placeholder="Location">
            <input type="text" placeholder="State">
            
            <h3>Upload Documents</h3>
            <label>License: <input type="file"></label>
            <label>VAT Certificate: <input type="file"></label>
            <label>Bank Account Letter: <input type="file"></label>
            <button type="submit">Save</button>
        </form>
        <button onclick="exportTable('client-table')">Export to Excel/PDF</button>
    </section>

    <script>
        // 30-Day Expiry Notification Logic
        function checkExpiry(expiryDate) {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diffTime = expiry - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 30 && diffDays >= 0) {
                alert("Alert: A document is expiring within 30 days!");
            }
        }
        
        function exportTable(tableId) {
            // Placeholder for Export functionality
            console.log("Exporting " + tableId + "...");
        }
    </script>
</body>
</html>
